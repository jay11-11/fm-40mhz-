<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff" stroke="#000" stroke-width="2"/>
  
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    FM VCO Control Module - Circuit Diagram
  </text>
  <text x="600" y="55" font-size="14" text-anchor="middle" fill="#333">
    BB910 Varactor Diode Frequency Control
  </text>
  
  <!-- Power Supply Section -->
  <g id="power-section">
    <text x="50" y="100" font-size="14" font-weight="bold" fill="#000">Power Supply</text>
    
    <!-- J1 Power Connector -->
    <rect x="30" y="120" width="80" height="60" fill="#ffcccc" stroke="#000" stroke-width="2"/>
    <text x="70" y="140" font-size="12" text-anchor="middle" font-weight="bold">J1</text>
    <text x="70" y="160" font-size="10" text-anchor="middle">+9V</text>
    <text x="70" y="175" font-size="10" text-anchor="middle">GND</text>
    
    <!-- W1 (Potentiometer) -->
    <circle cx="70" cy="240" r="25" fill="#ffffcc" stroke="#000" stroke-width="2"/>
    <text x="70" y="245" font-size="12" text-anchor="middle" font-weight="bold">W1</text>
    <text x="100" y="245" font-size="10">100K</text>
    
    <!-- R1 (Resistor) -->
    <line x1="110" y1="140" x2="150" y2="140" stroke="#000" stroke-width="2"/>
    <rect x="150" y="130" width="40" height="20" fill="#ffffff" stroke="#000" stroke-width="1"/>
    <text x="170" y="155" font-size="10">R1</text>
    <text x="170" y="170" font-size="9">100K</text>
  </g>
  
  <!-- Voltage Divider Section -->
  <g id="divider-section">
    <text x="300" y="100" font-size="14" font-weight="bold" fill="#000">Voltage Divider</text>
    
    <!-- Connection from 9V -->
    <line x1="190" y1="140" x2="240" y2="140" stroke="#ff0000" stroke-width="3"/>
    <text x="215" y="130" font-size="11" fill="#ff0000" font-weight="bold">+9V</text>
    
    <!-- R1 vertical -->
    <rect x="235" y="140" width="20" height="60" fill="#ffffff" stroke="#000" stroke-width="1"/>
    <text x="260" y="175" font-size="10">R1</text>
    
    <!-- Junction to R2 -->
    <circle cx="245" cy="200" r="4" fill="#000"/>
    <line x1="245" y1="200" x2="300" y2="200" stroke="#000" stroke-width="2"/>
    
    <!-- R2 Potentiometer (Voltage Divider) -->
    <circle cx="340" cy="200" r="20" fill="#ffeecc" stroke="#000" stroke-width="2"/>
    <text x="340" y="205" font-size="11" text-anchor="middle" font-weight="bold">R2</text>
    <text x="375" y="200" font-size="10">100K Pot</text>
    
    <!-- Tap point from R2 -->
    <line x1="360" y1="200" x2="420" y2="200" stroke="#0066ff" stroke-width="2"/>
    <circle cx="420" cy="200" r="4" fill="#0066ff"/>
    <text x="420" y="190" font-size="10" fill="#0066ff" font-weight="bold">Ctrl V</text>
    
    <!-- R2 to GND -->
    <line x1="340" y1="220" x2="340" y2="280" stroke="#000" stroke-width="2"/>
    <circle cx="340" cy="280" r="4" fill="#000"/>
    
    <!-- GND symbol -->
    <line x1="325" y1="290" x2="355" y2="290" stroke="#000" stroke-width="2"/>
    <line x1="330" y1="296" x2="350" y2="296" stroke="#000" stroke-width="2"/>
    <line x1="335" y1="302" x2="345" y2="302" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Filter Network Section -->
  <g id="filter-section">
    <text x="500" y="100" font-size="14" font-weight="bold" fill="#000">Filter Network</text>
    
    <!-- Control voltage input -->
    <line x1="420" y1="200" x2="480" y2="200" stroke="#0066ff" stroke-width="2"/>
    
    <!-- R3 Resistor -->
    <rect x="480" y="190" width="40" height="20" fill="#ffffff" stroke="#000" stroke-width="1"/>
    <text x="495" y="160" font-size="10">R3</text>
    <text x="495" y="175" font-size="9">10K</text>
    
    <!-- R3 to Junction -->
    <line x1="520" y1="200" x2="560" y2="200" stroke="#000" stroke-width="2"/>
    <circle cx="560" cy="200" r="4" fill="#000"/>
    
    <!-- C1 Capacitor -->
    <line x1="560" y1="200" x2="560" y2="240" stroke="#000" stroke-width="2"/>
    <line x1="550" y1="245" x2="570" y2="245" stroke="#000" stroke-width="2"/>
    <line x1="550" y1="255" x2="570" y2="255" stroke="#000" stroke-width="2"/>
    <line x1="560" y1="255" x2="560" y2="290" stroke="#000" stroke-width="2"/>
    <text x="580" y="250" font-size="10">C1</text>
    <text x="580" y="265" font-size="9">10µF</text>
    
    <!-- C1 to GND -->
    <circle cx="560" cy="290" r="4" fill="#000"/>
    <line x1="545" y1="300" x2="575" y2="300" stroke="#000" stroke-width="2"/>
    <line x1="550" y1="306" x2="570" y2="306" stroke="#000" stroke-width="2"/>
    <line x1="555" y1="312" x2="565" y2="312" stroke="#000" stroke-width="2"/>
    
    <!-- Clean Control Voltage output -->
    <line x1="560" y1="200" x2="620" y2="200" stroke="#00aa00" stroke-width="2"/>
    <circle cx="620" cy="200" r="4" fill="#00aa00"/>
    <text x="620" y="190" font-size="10" fill="#00aa00" font-weight="bold">Clean V</text>
  </g>
  
  <!-- Varactor Diode Section -->
  <g id="varactor-section">
    <text x="700" y="100" font-size="14" font-weight="bold" fill="#000">Varactor Diode</text>
    
    <!-- Clean voltage input -->
    <line x1="620" y1="200" x2="680" y2="200" stroke="#00aa00" stroke-width="2"/>
    
    <!-- BB910 Varactor Diode -->
    <circle cx="740" cy="190" r="8" fill="#ffccff" stroke="#000" stroke-width="2"/>
    <text x="740" y="195" font-size="11" text-anchor="middle" font-weight="bold">D1</text>
    
    <!-- Cathode (K) - to oscillator -->
    <line x1="748" y1="190" x2="800" y2="190" stroke="#ff0000" stroke-width="2"/>
    <circle cx="800" cy="190" r="4" fill="#ff0000"/>
    <text x="810" y="190" font-size="11" fill="#ff0000" font-weight="bold">K→OSC OUT</text>
    
    <!-- Anode (A) - to bias resistor -->
    <line x1="732" y1="190" x2="680" y2="190" stroke="#000" stroke-width="2"/>
    <line x1="680" y1="190" x2="680" y2="230" stroke="#000" stroke-width="2"/>
    
    <!-- Bias resistor (internal to diode, showing connection) -->
    <line x1="680" y1="230" x2="680" y2="260" stroke="#000" stroke-width="2"/>
    <circle cx="680" cy="260" r="4" fill="#000"/>
    
    <!-- A to GND -->
    <line x1="665" y1="270" x2="695" y2="270" stroke="#000" stroke-width="2"/>
    <line x1="670" y1="276" x2="690" y2="276" stroke="#000" stroke-width="2"/>
    <line x1="675" y1="282" x2="685" y2="282" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Output Connectors Section -->
  <g id="output-section">
    <text x="900" y="100" font-size="14" font-weight="bold" fill="#000">Output Connectors</text>
    
    <!-- J2 Control Voltage Output -->
    <rect x="880" y="120" width="80" height="60" fill="#ccffcc" stroke="#000" stroke-width="2"/>
    <text x="920" y="140" font-size="12" text-anchor="middle" font-weight="bold">J2</text>
    <text x="920" y="160" font-size="9" text-anchor="middle">0-8.5V</text>
    <text x="920" y="175" font-size="9" text-anchor="middle">GND</text>
    
    <!-- J3 To Oscillator -->
    <rect x="880" y="220" width="80" height="60" fill="#ccccff" stroke="#000" stroke-width="2"/>
    <text x="920" y="240" font-size="12" text-anchor="middle" font-weight="bold">J3</text>
    <text x="920" y="260" font-size="9" text-anchor="middle">OSC-IN</text>
    <text x="920" y="275" font-size="9" text-anchor="middle">GND</text>
  </g>
  
  <!-- Connection lines to outputs -->
  <g id="output-lines">
    <!-- Control voltage to J2 -->
    <line x1="620" y1="200" x2="750" y2="200" stroke="#00aa00" stroke-width="2"/>
    <line x1="750" y1="200" x2="750" y2="150" stroke="#00aa00" stroke-width="2"/>
    <line x1="750" y1="150" x2="880" y2="150" stroke="#00aa00" stroke-width="2"/>
    
    <!-- Oscillator output to J3 -->
    <line x1="800" y1="190" x2="850" y2="190" stroke="#ff0000" stroke-width="2"/>
    <line x1="850" y1="190" x2="850" y2="250" stroke="#ff0000" stroke-width="2"/>
    <line x1="850" y1="250" x2="880" y2="250" stroke="#ff0000" stroke-width="2"/>
  </g>
  
  <!-- Legend and Notes -->
  <g id="legend">
    <text x="50" y="400" font-size="12" font-weight="bold" fill="#000">Signal Flow:</text>
    <line x1="50" y1="415" x2="90" y2="415" stroke="#ff0000" stroke-width="2"/>
    <text x="100" y="420" font-size="11">Power/High Level Signal (+9V)</text>
    
    <line x1="50" y1="440" x2="90" y2="440" stroke="#0066ff" stroke-width="2"/>
    <text x="100" y="445" font-size="11">Control Voltage (Divider Output)</text>
    
    <line x1="50" y1="465" x2="90" y2="465" stroke="#00aa00" stroke-width="2"/>
    <text x="100" y="470" font-size="11">Filtered Control Voltage</text>
    
    <line x1="50" y1="490" x2="90" y2="490" stroke="#000" stroke-width="2"/>
    <text x="100" y="495" font-size="11">Ground Return</text>
  </g>
  
  <!-- Component Values Box -->
  <g id="component-values">
    <rect x="50" y="530" width="350" height="250" fill="#f0f0f0" stroke="#000" stroke-width="1"/>
    <text x="60" y="550" font-size="12" font-weight="bold" fill="#000">Component Values:</text>
    
    <text x="70" y="575" font-size="11" fill="#000">• R1: 100K 1/4W (Limit Current)</text>
    <text x="70" y="595" font-size="11" fill="#000">• R2: 100K Potentiometer (Adjust V)</text>
    <text x="70" y="615" font-size="11" fill="#000">• R3: 10K 1/4W (Filter Impedance)</text>
    <text x="70" y="635" font-size="11" fill="#000">• C1: 10µF 16V (Low Pass Filter)</text>
    <text x="70" y="655" font-size="11" fill="#000">• D1: BB910 Varactor Diode</text>
    <text x="70" y="675" font-size="11" fill="#000">• J1, J2, J3: 2-Pin Headers</text>
    <text x="70" y="695" font-size="11" fill="#000">• Filter Cutoff: ~1.6kHz</text>
    <text x="70" y="715" font-size="11" fill="#000">• Ctrl Voltage Range: 0-8.5V</text>
    <text x="70" y="735" font-size="11" fill="#000">• Frequency Range: ±2-5MHz</text>
    <text x="70" y="755" font-size="11" fill="#000">• Power Supply: 9V DC</text>
  </g>
  
  <!-- Operating Points Box -->
  <g id="operating-points">
    <rect x="420" y="530" width="350" height="250" fill="#fff0f0" stroke="#000" stroke-width="1"/>
    <text x="430" y="550" font-size="12" font-weight="bold" fill="#000">Operating Points:</text>
    
    <text x="440" y="575" font-size="10" fill="#000">R2 Position → Ctrl V → Frequency</text>
    <text x="440" y="595" font-size="10" fill="#000">────────────────────────────────</text>
    <text x="440" y="615" font-size="10" fill="#666">0% (Left)    → 0.8V   → F-5MHz</text>
    <text x="440" y="635" font-size="10" fill="#666">25%          → 2.5V   → F-2MHz</text>
    <text x="440" y="655" font-size="10" fill="#000" font-weight="bold">50% (Mid)    → 4.5V   → F (Center)</text>
    <text x="440" y="675" font-size="10" fill="#666">75%          → 6.5V   → F+2MHz</text>
    <text x="440" y="695" font-size="10" fill="#666">100% (Right) → 8.5V   → F+5MHz</text>
    <text x="440" y="720" font-size="10" fill="#000" font-weight="bold">Linear tuning curve!</text>
    <text x="440" y="740" font-size="10" fill="#000">Smooth frequency adjustment</text>
    <text x="440" y="760" font-size="10" fill="#000">No frequency jumping</text>
  </g>
  
  <!-- Connections Summary -->
  <g id="connections">
    <rect x="790" y="530" width="380" height="250" fill="#f0fff0" stroke="#000" stroke-width="1"/>
    <text x="800" y="550" font-size="12" font-weight="bold" fill="#000">External Connections:</text>
    
    <text x="820" y="575" font-size="10" fill="#000">To FM Transmitter:</text>
    <text x="820" y="595" font-size="10" fill="#ff0000" font-weight="bold">J1 Pin 1: ← +9V Power</text>
    <text x="820" y="615" font-size="10" fill="#000" font-weight="bold">J1 Pin 2: ← GND</text>
    <text x="820" y="635" font-size="10" fill="#000" font-weight="bold">J3 Pin 1: → C7 Point (Oscillator)</text>
    <text x="820" y="655" font-size="10" fill="#000" font-weight="bold">J3 Pin 2: → GND</text>
    
    <text x="820" y="680" font-size="10" fill="#0066ff" font-weight="bold">For Monitoring:</text>
    <text x="820" y="700" font-size="10" fill="#0066ff">J2 Pin 1: Control Voltage (0-8.5V)</text>
    <text x="820" y="720" font-size="10" fill="#0066ff">J2 Pin 2: GND (Reference)</text>
    
    <text x="820" y="745" font-size="9" fill="#666">Use J2 with multimeter to verify</text>
    <text x="820" y="760" font-size="9" fill="#666">control voltage when rotating R2</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="800" font-size="10" text-anchor="middle" fill="#666">
    FM VCO Module v1.0 - Voltage Controlled Oscillator for FM Transmitter
  </text>
</svg>