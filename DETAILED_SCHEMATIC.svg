<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <!-- Background -->
  <rect width="1400" height="900" fill="#ffffff" stroke="#333" stroke-width="2"/>
  
  <!-- Title -->
  <text x="700" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#000">
    FM VCO Module - Based on Your Transmitter
  </text>
  <text x="700" y="60" font-size="14" text-anchor="middle" fill="#333">
    To be connected at C7 (18-22pF) Oscillator Tank Circuit
  </text>
  
  <!-- ===== LEFT SECTION: POWER DISTRIBUTION ===== -->
  <g id="power-dist">
    <text x="60" y="90" font-size="13" font-weight="bold" fill="#000">① POWER DISTRIBUTION</text>
    
    <!-- 9V Input -->
    <rect x="20" y="110" width="70" height="50" fill="#ffcccc" stroke="#000" stroke-width="2" rx="5"/>
    <text x="55" y="125" font-size="12" font-weight="bold" text-anchor="middle">J1</text>
    <text x="55" y="143" font-size="10" text-anchor="middle">+9V/GND</text>
    
    <!-- From J1 to power rail -->
    <line x1="90" y1="130" x2="130" y2="130" stroke="#ff0000" stroke-width="3"/>
    <circle cx="130" cy="130" r="3" fill="#ff0000"/>
    <text x="140" y="135" font-size="10" fill="#ff0000" font-weight="bold">+9V Rail</text>
    
    <!-- Ground -->
    <line x1="90" y1="155" x2="130" y2="155" stroke="#000" stroke-width="3"/>
    <circle cx="130" cy="155" r="3" fill="#000"/>
    <!-- GND symbol -->
    <line x1="120" y1="165" x2="140" y2="165" stroke="#000" stroke-width="2"/>
    <line x1="123" y1="171" x2="137" y2="171" stroke="#000" stroke-width="2"/>
    <line x1="126" y1="177" x2="134" y2="177" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- ===== CENTER-LEFT SECTION: VOLTAGE DIVIDER ===== -->
  <g id="voltage-divider">
    <text x="220" y="90" font-size="13" font-weight="bold" fill="#000">② VOLTAGE DIVIDER (R1, R2)</text>
    
    <!-- +9V from power rail -->
    <line x1="130" y1="130" x2="200" y2="130" stroke="#ff0000" stroke-width="3"/>
    
    <!-- R1 - 100K limit resistor -->
    <rect x="200" y="120" width="30" height="20" fill="#fff8dc" stroke="#000" stroke-width="1"/>
    <text x="215" y="155" font-size="10" text-anchor="middle">R1</text>
    <text x="215" y="170" font-size="9" text-anchor="middle">100K</text>
    
    <!-- Line down from R1 -->
    <line x1="215" y1="140" x2="215" y2="180" stroke="#000" stroke-width="2"/>
    <circle cx="215" cy="180" r="3" fill="#000"/>
    
    <!-- R2 Potentiometer (3-pin) -->
    <circle cx="280" cy="180" r="22" fill="#fff9e6" stroke="#000" stroke-width="2"/>
    <text x="280" y="185" font-size="12" font-weight="bold" text-anchor="middle">R2</text>
    <text x="360" y="180" font-size="10">100K Pot</text>
    
    <!-- R2 connections -->
    <!-- Left pin: from R1 -->
    <line x1="258" y1="180" x2="230" y2="180" stroke="#000" stroke-width="2"/>
    <line x1="230" y1="180" x2="215" y2="180" stroke="#000" stroke-width="2"/>
    
    <!-- Center tap: control voltage output -->
    <line x1="280" y1="158" x2="280" y2="130" stroke="#0066ff" stroke-width="3"/>
    <circle cx="280" cy="130" r="3" fill="#0066ff"/>
    <text x="295" y="135" font-size="10" fill="#0066ff" font-weight="bold">Ctrl V Out</text>
    
    <!-- Right pin: to GND -->
    <line x1="302" y1="180" x2="330" y2="180" stroke="#000" stroke-width="2"/>
    <line x1="330" y1="180" x2="330" y2="220" stroke="#000" stroke-width="2"/>
    <circle cx="330" cy="220" r="3" fill="#000"/>
    
    <!-- GND symbol -->
    <line x1="320" y1="230" x2="340" y2="230" stroke="#000" stroke-width="2"/>
    <line x1="323" y1="236" x2="337" y2="236" stroke="#000" stroke-width="2"/>
    <line x1="326" y1="242" x2="334" y2="242" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- ===== CENTER SECTION: FILTER NETWORK ===== -->
  <g id="filter-network">
    <text x="450" y="90" font-size="13" font-weight="bold" fill="#000">③ FILTER NETWORK (R3, C1)</text>
    
    <!-- Ctrl V input from divider -->
    <line x1="280" y1="130" x2="380" y2="130" stroke="#0066ff" stroke-width="2"/>
    
    <!-- R3 - 10K resistor -->
    <rect x="380" y="120" width="30" height="20" fill="#fff8dc" stroke="#000" stroke-width="1"/>
    <text x="395" y="155" font-size="10" text-anchor="middle">R3</text>
    <text x="395" y="170" font-size="9" text-anchor="middle">10K</text>
    
    <!-- Junction after R3 -->
    <line x1="410" y1="130" x2="450" y2="130" stroke="#000" stroke-width="2"/>
    <circle cx="450" cy="130" r="3" fill="#000"/>
    
    <!-- C1 capacitor (from junction to GND) -->
    <line x1="450" y1="130" x2="450" y2="170" stroke="#000" stroke-width="2"/>
    
    <!-- Capacitor symbol -->
    <line x1="440" y1="180" x2="460" y2="180" stroke="#000" stroke-width="2"/>
    <line x1="440" y1="190" x2="460" y2="190" stroke="#000" stroke-width="2"/>
    
    <text x="475" y="185" font-size="10">C1</text>
    <text x="475" y="200" font-size="9">10µF/16V</text>
    
    <!-- C1 to GND -->
    <line x1="450" y1="190" x2="450" y2="220" stroke="#000" stroke-width="2"/>
    <circle cx="450" cy="220" r="3" fill="#000"/>
    
    <!-- GND symbol -->
    <line x1="440" y1="230" x2="460" y2="230" stroke="#000" stroke-width="2"/>
    <line x1="443" y1="236" x2="457" y2="236" stroke="#000" stroke-width="2"/>
    <line x1="446" y1="242" x2="454" y2="242" stroke="#000" stroke-width="2"/>
    
    <!-- Clean output from junction -->
    <line x1="450" y1="130" x2="500" y2="130" stroke="#00aa00" stroke-width="3"/>
    <circle cx="500" cy="130" r="3" fill="#00aa00"/>
    <text x="510" y="135" font-size="10" fill="#00aa00" font-weight="bold">Clean V</text>
    
    <!-- Cutoff frequency note -->
    <text x="380" y="270" font-size="10" fill="#666">fc = 1/(2π·R3·C1)</text>
    <text x="380" y="285" font-size="10" fill="#666">fc ≈ 1.6 kHz (very clean!)</text>
  </g>
  
  <!-- ===== RIGHT SECTION: VARACTOR & OSCILLATOR CONNECTION ===== -->
  <g id="varactor-section">
    <text x="750" y="90" font-size="13" font-weight="bold" fill="#000">④ VARACTOR DIODE (D1: BB910)</text>
    
    <!-- Clean V input -->
    <line x1="500" y1="130" x2="580" y2="130" stroke="#00aa00" stroke-width="2"/>
    
    <!-- BB910 Varactor Diode (symbol) -->
    <circle cx="640" cy="130" r="20" fill="#ffe6ff" stroke="#000" stroke-width="2"/>
    <text x="640" y="137" font-size="11" font-weight="bold" text-anchor="middle">D1</text>
    <text x="710" y="135" font-size="10">BB910</text>
    
    <!-- Diode polarity indicator -->
    <text x="640" y="115" font-size="8" text-anchor="middle">K(正)</text>
    <text x="640" y="150" font-size="8" text-anchor="middle">A(负)</text>
    
    <!-- K pin: to oscillator C7 -->
    <line x1="660" y1="130" x2="750" y2="130" stroke="#ff0000" stroke-width="3"/>
    <circle cx="750" cy="130" r="4" fill="#ff0000"/>
    <text x="765" y="135" font-size="11" fill="#ff0000" font-weight="bold">→ C7 (Osc)</text>
    
    <!-- A pin: bias network -->
    <line x1="620" y1="130" x2="580" y2="130" stroke="#00aa00" stroke-width="2"/>
    <line x1="580" y1="130" x2="580" y2="170" stroke="#000" stroke-width="2"/>
    <circle cx="580" cy="170" r="3" fill="#000"/>
    
    <!-- Bias to GND -->
    <line x1="580" y1="170" x2="580" y2="200" stroke="#000" stroke-width="2"/>
    <circle cx="580" cy="200" r="3" fill="#000"/>
    
    <!-- GND symbol -->
    <line x1="570" y1="210" x2="590" y2="210" stroke="#000" stroke-width="2"/>
    <line x1="573" y1="216" x2="587" y2="216" stroke="#000" stroke-width="2"/>
    <line x1="576" y1="222" x2="584" y2="222" stroke="#000" stroke-width="2"/>
    
    <!-- Varactor function note -->
    <rect x="780" y="100" width="240" height="80" fill="#fff5e6" stroke="#000" stroke-width="1" rx="3"/>
    <text x="795" y="120" font-size="10" font-weight="bold" fill="#000">Varactor Function:</text>
    <text x="795" y="138" font-size="9" fill="#000">• Acts as variable capacitor</text>
    <text x="795" y="153" font-size="9" fill="#000">• Bias V changes capacitance</text>
    <text x="795" y="168" font-size="9" fill="#000">• Shifts oscillator frequency</text>
  </g>
  
  <!-- ===== OUTPUT CONNECTORS ===== -->
  <g id="output-connectors">
    <text x="60" y="360" font-size="13" font-weight="bold" fill="#000">⑤ OUTPUT CONNECTORS</text>
    
    <!-- J2: Control Voltage Monitor -->
    <rect x="20" y="380" width="90" height="60" fill="#ccffcc" stroke="#000" stroke-width="2" rx="5"/>
    <text x="65" y="397" font-size="12" font-weight="bold" text-anchor="middle">J2</text>
    <text x="65" y="415" font-size="9" text-anchor="middle">0-8.5V Out</text>
    <text x="65" y="430" font-size="9" text-anchor="middle">GND</text>
    
    <!-- Connection from control voltage divider -->
    <line x1="280" y1="130" x2="280" y2="310" stroke="#0066ff" stroke-width="2"/>
    <line x1="280" y1="310" x2="110" y2="310" stroke="#0066ff" stroke-width="2"/>
    <line x1="110" y1="310" x2="110" y2="390" stroke="#0066ff" stroke-width="2"/>
    <circle cx="110" cy="390" r="3" fill="#0066ff"/>
    <text x="125" y="395" font-size="9" fill="#0066ff">Ctrl V</text>
    
    <!-- J3: To Oscillator (C7 point) -->
    <rect x="20" y="480" width="90" height="60" fill="#ccccff" stroke="#000" stroke-width="2" rx="5"/>
    <text x="65" y="497" font-size="12" font-weight="bold" text-anchor="middle">J3</text>
    <text x="65" y="515" font-size="9" text-anchor="middle">Osc-In</text>
    <text x="65" y="530" font-size="9" text-anchor="middle">GND</text>
    
    <!-- Connection from varactor K -->
    <line x1="750" y1="130" x2="790" y2="130" stroke="#ff0000" stroke-width="3"/>
    <line x1="790" y1="130" x2="790" y2="510" stroke="#ff0000" stroke-width="2"/>
    <line x1="790" y1="510" x2="110" y2="510" stroke="#ff0000" stroke-width="2"/>
    <circle cx="110" cy="510" r="3" fill="#ff0000"/>
    <text x="125" y="515" font-size="9" fill="#ff0000">Osc Out</text>
  </g>
  
  <!-- ===== CONNECTION TO FM TRANSMITTER ===== -->
  <g id="fm-transmitter-connection">
    <text x="350" y="360" font-size="13" font-weight="bold" fill="#000">⑥ OSCILLATOR CONNECTION DETAIL</text>
    
    <!-- Show C7 location on oscillator -->
    <rect x="280" y="380" width="300" height="140" fill="#fff9e6" stroke="#000" stroke-width="2" rx="5"/>
    
    <text x="300" y="400" font-size="11" font-weight="bold" fill="#000">FM Transmitter Oscillator:</text>
    
    <!-- L1 coil symbol -->
    <circle cx="340" cy="450" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="355" cy="450" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <text x="350" y="480" font-size="9" text-anchor="middle">L1</text>
    
    <!-- Original C7 capacitor -->
    <line x1="360" y1="450" x2="400" y2="450" stroke="#000" stroke-width="2"/>
    <line x1="405" y1="440" x2="405" y2="460" stroke="#000" stroke-width="2"/>
    <line x1="415" y1="440" x2="415" y2="460" stroke="#000" stroke-width="2"/>
    <line x1="420" y1="450" x2="450" y2="450" stroke="#000" stroke-width="2"/>
    <text x="410" y="475" font-size="9" text-anchor="middle">C7(18-22pF)</text>
    
    <!-- Connection point -->
    <circle cx="405" cy="450" r="4" fill="#ff0000" stroke="#ff0000" stroke-width="2"/>
    <line x1="450" y1="450" x2="550" y2="450" stroke="#ff0000" stroke-width="3"/>
    <text x="500" y="440" font-size="10" fill="#ff0000" font-weight="bold">← Connect Here!</text>
    
    <!-- GND connection -->
    <line x1="340" y1="460" x2="340" y2="490" stroke="#000" stroke-width="2"/>
    <circle cx="340" cy="490" r="3" fill="#000"/>
    <line x1="330" y1="500" x2="350" y2="500" stroke="#000" stroke-width="2"/>
    <line x1="333" y1="506" x2="347" y2="506" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- ===== FREQUENCY TUNING TABLE ===== -->
  <g id="tuning-table">
    <text x="800" y="360" font-size="13" font-weight="bold" fill="#000">⑦ FREQUENCY TUNING CURVE</text>
    
    <rect x="780" y="380" width="380" height="220" fill="#f5f5f5" stroke="#000" stroke-width="1" rx="3"/>
    
    <!-- Table header -->
    <text x="800" y="405" font-size="11" font-weight="bold" fill="#000">R2 Position</text>
    <text x="950" y="405" font-size="11" font-weight="bold" fill="#000">Ctrl Voltage</text>
    <text x="1100" y="405" font-size="11" font-weight="bold" fill="#000">Frequency Shift</text>
    
    <!-- Horizontal line -->
    <line x1="790" y1="410" x2="1150" y2="410" stroke="#000" stroke-width="1"/>
    
    <!-- Data rows -->
    <text x="800" y="435" font-size="10" fill="#666">0% (Left)</text>
    <text x="950" y="435" font-size="10" fill="#666">0.8V</text>
    <text x="1100" y="435" font-size="10" fill="#666">-5 MHz</text>
    
    <text x="800" y="460" font-size="10" fill="#666">25%</text>
    <text x="950" y="460" font-size="10" fill="#666">2.5V</text>
    <text x="1100" y="460" font-size="10" fill="#666">-2 MHz</text>
    
    <text x="800" y="485" font-size="10" fill="#000" font-weight="bold">50% (Center)</text>
    <text x="950" y="485" font-size="10" fill="#000" font-weight="bold">4.5V</text>
    <text x="1100" y="485" font-size="10" fill="#000" font-weight="bold">0 MHz (No shift)</text>
    
    <text x="800" y="510" font-size="10" fill="#666">75%</text>
    <text x="950" y="510" font-size="10" fill="#666">6.5V</text>
    <text x="1100" y="510" font-size="10" fill="#666">+2 MHz</text>
    
    <text x="800" y="535" font-size="10" fill="#666">100% (Right)</text>
    <text x="950" y="535" font-size="10" fill="#666">8.5V</text>
    <text x="1100" y="535" font-size="10" fill="#666">+5 MHz</text>
    
    <!-- Note -->
    <text x="800" y="565" font-size="9" fill="#0066ff" font-weight="bold">✓ Linear tuning = Smooth frequency adjustment</text>
    <text x="800" y="580" font-size="9" fill="#0066ff" font-weight="bold">✓ No frequency jumping = Stable modulation</text>
  </g>
  
  <!-- ===== COMPONENT VALUES SUMMARY ===== -->
  <g id="component-summary">
    <text x="60" y="700" font-size="13" font-weight="bold" fill="#000">⑧ COMPONENT VALUES & SPECIFICATIONS</text>
    
    <!-- Left column -->
    <rect x="20" y="720" width="280" height="150" fill="#f0f0f0" stroke="#000" stroke-width="1" rx="3"/>
    <text x="40" y="740" font-size="11" font-weight="bold" fill="#000">Components:</text>
    <text x="40" y="760" font-size="10" fill="#000">• J1: 2-Pin Power Connector</text>
    <text x="40" y="778" font-size="10" fill="#000">• J2: 2-Pin Control V Output</text>
    <text x="40" y="796" font-size="10" fill="#000">• J3: 2-Pin Oscillator Input</text>
    <text x="40" y="814" font-size="10" fill="#000">• R1: 100K 1/4W Resistor</text>
    <text x="40" y="832" font-size="10" fill="#000">• R2: 100K Linear Potentiometer</text>
    <text x="40" y="850" font-size="10" fill="#000">• R3: 10K 1/4W Resistor</text>
    
    <!-- Center column -->
    <rect x="330" y="720" width="280" height="150" fill="#f0f0f0" stroke="#000" stroke-width="1" rx="3"/>
    <text x="350" y="740" font-size="11" font-weight="bold" fill="#000">Specifications:</text>
    <text x="350" y="760" font-size="10" fill="#000">• Power Supply: 9V DC</text>
    <text x="350" y="778" font-size="10" fill="#000">• Current Draw: <50mA</text>
    <text x="350" y="796" font-size="10" fill="#000">• Control Range: 0-8.5V</text>
    <text x="350" y="814" font-size="10" fill="#000">• Frequency Range: ±2-5MHz</text>
    <text x="350" y="832" font-size="10" fill="#000">• Filter Cutoff: ~1.6kHz</text>
    <text x="350" y="850" font-size="10" fill="#000">• Linearity: ±5% across range</text>
    
    <!-- Right column -->
    <rect x="640" y="720" width="280" height="150" fill="#f0f0f0" stroke="#000" stroke-width="1" rx="3"/>
    <text x="660" y="740" font-size="11" font-weight="bold" fill="#000">Critical Component:</text>
    <text x="660" y="760" font-size="10" fill="#000">• D1: BB910 Varactor Diode</text>
    <text x="660" y="778" font-size="10" fill="#000">  - Cathode (K): Red/Black band</text>
    <text x="660" y="796" font-size="10" fill="#000">  - Anode (A): Opposite side</text>
    <text x="660" y="814" font-size="10" fill="#000">  - C1: 10µF/16V Capacitor</text>
    <text x="660" y="832" font-size="10" fill="#000">  - Polarity: Long leg to +</text>
    <text x="660" y="850" font-size="10" fill="#000">  - Package: SMD0805 or DIP</text>
    
    <!-- Bottom info -->
    <rect x="950" y="720" width="380" height="150" fill="#ffe6e6" stroke="#cc0000" stroke-width="1" rx="3"/>
    <text x="970" y="740" font-size="11" font-weight="bold" fill="#cc0000">⚠ IMPORTANT NOTES:</text>
    <text x="970" y="760" font-size="10" fill="#000">1. BB910 is ESD sensitive - ground before soldering</text>
    <text x="970" y="778" font-size="10" fill="#000">2. Soldering temp: <350°C, Time: <3s per pin</text>
    <text x="970" y="796" font-size="10" fill="#000">3. All GND connections must be at same potential</text>
    <text x="970" y="814" font-size="10" fill="#000">4. Keep control voltage line away from RF signals</text>
    <text x="970" y="832" font-size="10" fill="#000">5. Use short connecting wires (< 10cm) to reduce noise</text>
    <text x="970" y="850" font-size="10" fill="#000">6. Use 22AWG shielded cable for oscillator connection</text>
  </g>
  
  <!-- ===== FOOTER ===== -->
  <line x1="20" y1="890" x2="1380" y2="890" stroke="#333" stroke-width="1"/>
  <text x="30" y="895" font-size="9" fill="#666">
    FM VCO Module Schematic v1.0 | Based on Your 40MHz FM Transmitter | 2026-06-16
  </text>
</svg>